repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-fmt
        name: Go Format (auto-fix)
        entry: gofmt -w
        language: system
        files: \.go$

      - id: go-build
        name: Go Build
        entry: go build ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-test
        name: Go Test
        entry: go test ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-lint
        name: Go Lint (vet)
        entry: go vet ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: update-badges
        name: Update README shields
        entry: python3 scripts/update_badges.py
        language: system
        pass_filenames: false
        files: \.go$|^README\.md$

      - id: test-swagger-petstore
        name: Swagger 2.0 Petstore test
        entry: bash -c './bin/cdd-go from_openapi to_sdk -i ../petstore.json -o my_generated_sdk_swagger'
        language: system
        pass_filenames: false
        files: \.go$

      - id: test-openapi-petstore
        name: OpenAPI 3.2.0 Petstore test
        entry: bash -c './bin/cdd-go from_openapi to_sdk -i ../petstore_oas3.json -o my_generated_sdk_oas3'
        language: system
        pass_filenames: false
        files: \.go$

      - id: test-build-wasm
        name: Build WASM
        entry: make build_wasm
        language: system
        pass_filenames: false
        files: \.go$
