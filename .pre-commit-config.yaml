repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-fmt
        name: Go Format (auto-fix)
        entry: gofmt -w
        language: system
        files: \.go$

      - id: go-build
        name: Go Build
        entry: go build ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-test
        name: Go Test
        entry: go test ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-vet
        name: Go Lint (vet)
        entry: go vet ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: update-badges
        name: Update README shields
        entry: python3 scripts/update_badges.py
        language: system
        pass_filenames: false
        files: \.go$|^README\.md$
