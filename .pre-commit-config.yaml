repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$

  - repo: local
    hooks:
      - id: go-fmt
        name: Go Format (auto-fix)
        entry: gofmt -w
        language: system
        files: \.go$

      - id: go-build
        name: Go Build
        entry: go build ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-test
        name: Go Test
        entry: go test ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-lint
        name: Go Lint (vet)
        entry: go vet ./...
        language: system
        pass_filenames: false
        files: \.go$

      - id: update-badges
        name: Update README shields
        entry: go run scripts/update_badges/update_badges.go
        language: system
        pass_filenames: false
        files: \.go$|^README\.md$

      - id: test-swagger-petstore
        name: Swagger 2.0 Petstore test
        entry: go run ./cmd/cdd-go from_openapi to_sdk -i ../petstore.json -o my_generated_sdk_swagger
        language: system
        pass_filenames: false
        files: \.go$

      - id: test-openapi-petstore
        name: OpenAPI 3.2.0 Petstore test
        entry: go run ./cmd/cdd-go from_openapi to_sdk -i ../petstore_oas3.json -o my_generated_sdk_oas3
        language: system
        pass_filenames: false
        files: \.go$

      - id: test-build-wasm
        name: Build WASM
        entry: go run scripts/build_wasm/build_wasm.go
        language: system
        pass_filenames: false
        files: \.go$
