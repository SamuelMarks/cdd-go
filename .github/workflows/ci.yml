name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Download Dependencies
      run: go mod download

    - name: Run Tests
      run: make test

  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Build WASM
      run: make build_wasm

    - name: Build native
      run: make build

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          bin/cdd-go.wasm
          bin/cdd-go
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
