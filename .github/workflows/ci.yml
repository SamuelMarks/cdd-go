name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install Dependencies
      run: make install_deps

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Build WASM
      run: make build_wasm

    - name: Build Docker Alpine
      run: docker build -t cdd-go:alpine -f alpine.Dockerfile .

    - name: Build Docker Debian
      run: docker build -t cdd-go:debian -f debian.Dockerfile .

    - name: Upload Artifacts
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/cdd-go
          bin/cdd-go.wasm
