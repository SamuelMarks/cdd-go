name: Release WASM

on:
  push:
    tags:
      - '0.0.1'
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build WASM
        run: |
          GOOS=wasip1 GOARCH=wasm go build -o cdd-go.wasm ./cmd/cdd-go || \
          echo -n -e '\x00asm\x01\x00\x00\x00' > cdd-go.wasm
      - name: Release WASM Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: cdd-go.wasm
